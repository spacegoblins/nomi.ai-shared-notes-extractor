<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f10;
      color: #e4e4e7;
      width: 280px;
      padding: 16px;
      min-height: 120px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .header .logo {
      font-size: 20px;
      line-height: 1;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #e4e4e7;
      line-height: 1.2;
    }

    .header p {
      font-size: 11px;
      color: #71717a;
      margin-top: 1px;
    }

    .divider {
      height: 1px;
      background: #27272a;
      margin-bottom: 14px;
    }

    /* ── Button Bar ── */

    .button-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .btn-capsule {
      all: unset;
      font-size: 11px;
      font-weight: 600;
      color: #a1a1aa;
      cursor: pointer;
      padding: 3px 10px;
      border-radius: 10px;
      border: 1px solid #3f3f46;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
    }

    .btn-capsule:hover {
      color: #e4e4e7;
      background: #27272a;
      border-color: #52525b;
    }

    /* ── Status Boxes ── */

    .status-box {
      border-radius: 4px;
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .status-box.ready {
      background: #14532d22;
      border: 1px solid #166534;
      color: #86efac;
    }

    .status-box.navigate {
      background: #7c290022;
      border: 1px solid #9a3412;
      color: #fca5a5;
    }

    .status-box.warning {
      background: #78350022;
      border: 1px solid #92400e;
      color: #fcd34d;
    }

    .status-box .label {
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .status-hint {
      font-size: 12px;
      color: #a1a1aa;
      margin-top: 4px;
    }

    /* ── Buttons ── */

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-navigate {
      background: #27272a;
      color: #e4e4e7;
      border: 1px solid #3f3f46;
    }

    .btn-navigate:hover { background: #3f3f46; }

    /* ── Settings Panel ── */

    .panel-heading {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .panel-desc {
      font-size: 12px;
      color: #a1a1aa;
      margin-bottom: 10px;
    }

    .settings-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      cursor: pointer;
    }

    .checkbox-row input[type="checkbox"] {
      accent-color: #818cf8;
      width: 14px;
      height: 14px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">📦</div>
    <div>
      <h1>Nomi.AI Shared Notes Extractor</h1>
      <p>Export and import Shared Notes in .txt, .md, .csv</p>
      <p>This tool is not affiliated with Nomi.ai or Glimpse.ai.</p>
    </div>
  </div>
  <div class="divider"></div>
  <div class="button-bar" id="button-bar"></div>
  <div id="content"></div>

  <script src="popup.js"></script>
</body>
</html>
